# Copy this file to .github/workflows/ci.yml when this addon is its own repository.

name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  GODOT_VERSION: "4.6.3"

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install gdtoolkit
        run: pip install gdtoolkit

      - name: Install Godot
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          echo "GODOT_PATH=$PWD/Godot_v${GODOT_VERSION}-stable_linux.x86_64" >> "$GITHUB_ENV"

      - name: Lint and test
        run: python tools/run_tests.py
